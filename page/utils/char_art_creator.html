<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title data-i18n="title">Char-Art Creator</title>
  <link rel="stylesheet" href="../assets/fontawesome/css/all.min.css" />
  <style>
    :root {
      --bg: #101114;
      --fg: #f5f2ea;
      --muted: #aaa49a;
      --panel: #191b20;
      --panel-2: #22252b;
      --border: #343841;
      --accent: #24c6a8;
      --accent-2: #ffb84d;
      --shadow: 0 18px 42px rgba(0, 0, 0, .28);
      --radius: 8px;
    }

    html[data-theme="light"] {
      --bg: #f5f7f4;
      --fg: #171a18;
      --muted: #606960;
      --panel: #ffffff;
      --panel-2: #eef2ef;
      --border: #d9dfda;
      --accent: #008f7d;
      --accent-2: #c27a00;
      --shadow: 0 16px 36px rgba(31, 38, 35, .12);
    }

    * { box-sizing: border-box; }

    html, body { min-height: 100%; }

    body {
      margin: 0;
      color: var(--fg);
      background:
        linear-gradient(135deg, color-mix(in srgb, var(--accent) 20%, transparent), transparent 34%),
        linear-gradient(315deg, color-mix(in srgb, var(--accent-2) 16%, transparent), transparent 36%),
        var(--bg);
      font: 14px/1.5 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    button, input, select, textarea { font: inherit; }

    button:focus-visible,
    input:focus-visible,
    select:focus-visible,
    textarea:focus-visible {
      outline: 3px solid color-mix(in srgb, var(--accent) 42%, transparent);
      outline-offset: 2px;
    }

    a:focus-visible {
      outline: 3px solid color-mix(in srgb, var(--accent) 42%, transparent);
      outline-offset: 2px;
    }

    .lang-selector {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
      padding: 4px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--panel);
    }

    .lang-selector a {
      min-width: 38px;
      text-align: center;
      text-decoration: none;
      color: var(--muted);
      padding: 6px 9px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 800;
      border: 1px solid transparent;
    }

    .lang-selector a:hover {
      color: var(--fg);
    }

    .lang-selector a.active {
      background: var(--accent);
      color: #08100e;
      border-color: var(--accent);
    }

    header {
      position: sticky;
      top: 0;
      z-index: 5;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      background: color-mix(in srgb, var(--panel) 88%, transparent);
      -webkit-backdrop-filter: blur(12px);
      backdrop-filter: blur(12px);
    }

    h1 {
      margin: 0;
      font-size: 17px;
      line-height: 1.2;
    }

    main {
      width: min(1180px, 100%);
      margin: 0 auto;
      padding: 20px 16px 28px;
      display: grid;
      grid-template-columns: minmax(280px, 380px) minmax(0, 1fr);
      gap: 16px;
    }

    .spacer { flex: 1; }

    .panel {
      min-width: 0;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
    }

    .panel-title {
      margin: 0;
      font-size: 14px;
      font-weight: 800;
    }

    .panel-body {
      padding: 14px;
      display: grid;
      gap: 14px;
    }

    label {
      display: block;
      margin: 0 0 6px;
      color: var(--muted);
      font-weight: 700;
      font-size: 12px;
    }

    textarea,
    input,
    select {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 7px;
      background: var(--panel-2);
      color: var(--fg);
      padding: 10px 11px;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn {
      min-height: 36px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: 1px solid var(--border);
      border-radius: 7px;
      background: var(--panel-2);
      color: var(--fg);
      padding: 8px 11px;
      cursor: pointer;
      font-weight: 800;
    }

    .btn:hover {
      border-color: color-mix(in srgb, var(--accent) 50%, var(--border));
    }

    .btn.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #08100e;
    }

    .icon-btn {
      width: 38px;
      padding: 0;
    }

    .hint {
      color: var(--muted);
      font-size: 12px;
    }

    .output-wrap {
      min-height: 560px;
      overflow: auto;
      padding: 0;
    }

    #output {
      min-width: max-content;
      min-height: 560px;
      margin: 0;
      padding: 18px;
      white-space: pre;
      tab-size: 2;
      color: var(--fg);
      background:
        linear-gradient(color-mix(in srgb, var(--fg) 4%, transparent) 1px, transparent 1px),
        linear-gradient(90deg, color-mix(in srgb, var(--fg) 4%, transparent) 1px, transparent 1px),
        var(--panel);
      background-size: 18px 18px;
      font: 16px/1.08 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    }

    .status {
      color: var(--muted);
      font-size: 12px;
      min-height: 18px;
    }

    @media (max-width: 860px) {
      main { grid-template-columns: 1fr; }
      .output-wrap, #output { min-height: 380px; }
    }

    @media (max-width: 560px) {
      header { flex-wrap: wrap; }
      .grid { grid-template-columns: 1fr; }
      .spacer { display: none; }
      #output { font-size: 12px; }
    }
  </style>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-NWZDZ906DJ"></script>
  <script>

    function gtag(){dataLayer.push(arguments);}

</head>
<body>
  <header>
    <h1 data-i18n="title">Char-Art Creator</h1>
    <div class="spacer"></div>
    <div class="lang-selector" aria-label="Language">
      <a href="#" data-lang="en" class="active">EN</a>
      <a href="#" data-lang="ja">JA</a>
      <a href="#" data-lang="pt">PT</a>
    </div>
    <button id="themeBtn" class="btn icon-btn" title="Toggle theme" aria-label="Toggle theme">
      <i class="fas fa-moon"></i>
    </button>
  </header>

  <main>
    <section class="panel">
      <div class="panel-header">
        <h2 class="panel-title" data-i18n="inputTitle">Text</h2>
        <span class="hint" data-i18n="liveHint">Live preview</span>
      </div>
      <div class="panel-body">
        <div>
          <label for="textInput" data-i18n="wordLabel">Word or phrase</label>
          <textarea id="textInput" maxlength="180" spellcheck="false" data-i18n-placeholder="wordPlaceholder">CODEX</textarea>
        </div>

        <div class="grid">
          <div>
            <label for="fillInput" data-i18n="fillLabel">Fill character</label>
            <input id="fillInput" maxlength="2" value="#" />
          </div>
          <div>
            <label for="spaceInput" data-i18n="spaceLabel">Spacing</label>
            <select id="spaceInput">
              <option value="1">1</option>
              <option value="2" selected>2</option>
              <option value="3">3</option>
              <option value="4">4</option>
            </select>
          </div>
          <div>
            <label for="caseInput" data-i18n="caseLabel">Case</label>
            <select id="caseInput">
              <option value="upper" data-i18n="caseUpper">Uppercase</option>
              <option value="keep" data-i18n="caseKeep">Keep input</option>
              <option value="lower" data-i18n="caseLower">Lowercase</option>
            </select>
          </div>
          <div>
            <label for="styleInput" data-i18n="styleLabel">Style</label>
            <select id="styleInput">
              <option value="block" data-i18n="styleBlock">Block</option>
              <option value="outline" data-i18n="styleOutline">Outline</option>
            </select>
          </div>
        </div>

        <div class="toolbar">
          <button id="copyBtn" class="btn primary"><i class="fas fa-copy"></i><span data-i18n="copy">Copy</span></button>
          <button id="downloadBtn" class="btn"><i class="fas fa-download"></i><span data-i18n="download">Download</span></button>
          <button id="clearBtn" class="btn"><i class="fas fa-eraser"></i><span data-i18n="clear">Clear</span></button>
        </div>
        <div id="status" class="status" aria-live="polite"></div>
      </div>
    </section>

    <section class="panel">
      <div class="panel-header">
        <h2 class="panel-title" data-i18n="outputTitle">ASCII output</h2>
        <span id="sizeInfo" class="hint"></span>
      </div>
      <div class="output-wrap">
        <pre id="output"></pre>
      </div>
    </section>
  </main>

  <script>
    (() => {
      const $ = (selector) => document.querySelector(selector);
      const els = {
        text: $('#textInput'),
        fill: $('#fillInput'),
        spacing: $('#spaceInput'),
        caseMode: $('#caseInput'),
        style: $('#styleInput'),
        output: $('#output'),
        size: $('#sizeInfo'),
        status: $('#status'),
        langSelector: $('.lang-selector'),
        theme: $('#themeBtn'),
        copy: $('#copyBtn'),
        download: $('#downloadBtn'),
        clear: $('#clearBtn')
      };

      const i18n = {
        en: {
          title: 'Char-Art Creator',
          inputTitle: 'Text',
          liveHint: 'Live preview',
          wordLabel: 'Word or phrase',
          wordPlaceholder: 'Type something here',
          fillLabel: 'Fill character',
          spaceLabel: 'Spacing',
          caseLabel: 'Case',
          caseUpper: 'Uppercase',
          caseKeep: 'Keep input',
          caseLower: 'Lowercase',
          styleLabel: 'Style',
          styleBlock: 'Block',
          styleOutline: 'Outline',
          copy: 'Copy',
          download: 'Download',
          clear: 'Clear',
          outputTitle: 'ASCII output',
          copied: 'Copied to clipboard.',
          empty: 'Type a word to generate char-art.',
          downloaded: 'Downloaded as char-art.txt.',
          size: '{{cols}} columns x {{rows}} rows'
        },
        pt: {
          title: 'Criador de Char-Art',
          inputTitle: 'Texto',
          liveHint: 'Previa ao vivo',
          wordLabel: 'Palavra ou frase',
          wordPlaceholder: 'Digite algo aqui',
          fillLabel: 'Caractere de preenchimento',
          spaceLabel: 'Espacamento',
          caseLabel: 'Caixa',
          caseUpper: 'Maiusculas',
          caseKeep: 'Manter texto',
          caseLower: 'Minusculas',
          styleLabel: 'Estilo',
          styleBlock: 'Bloco',
          styleOutline: 'Contorno',
          copy: 'Copiar',
          download: 'Baixar',
          clear: 'Limpar',
          outputTitle: 'Saida ASCII',
          copied: 'Copiado para a area de transferencia.',
          empty: 'Digite uma palavra para gerar char-art.',
          downloaded: 'Baixado como char-art.txt.',
          size: '{{cols}} colunas x {{rows}} linhas'
        },
        ja: {
          title: 'チャーアート作成',
          inputTitle: 'テキスト',
          liveHint: 'ライブプレビュー',
          wordLabel: '単語またはフレーズ',
          wordPlaceholder: 'ここに入力',
          fillLabel: '塗りつぶし文字',
          spaceLabel: '間隔',
          caseLabel: '大文字/小文字',
          caseUpper: '大文字',
          caseKeep: '入力を維持',
          caseLower: '小文字',
          styleLabel: 'スタイル',
          styleBlock: 'ブロック',
          styleOutline: 'アウトライン',
          copy: 'コピー',
          download: 'ダウンロード',
          clear: 'クリア',
          outputTitle: 'ASCII出力',
          copied: 'クリップボードにコピーしました。',
          empty: '単語を入力するとチャーアートを生成します。',
          downloaded: 'char-art.txtとして保存しました。',
          size: '{{cols}}列 x {{rows}}行'
        }
      };

      const font = {
        A: ['01110','10001','10001','11111','10001','10001','10001'],
        B: ['11110','10001','10001','11110','10001','10001','11110'],
        C: ['01111','10000','10000','10000','10000','10000','01111'],
        D: ['11110','10001','10001','10001','10001','10001','11110'],
        E: ['11111','10000','10000','11110','10000','10000','11111'],
        F: ['11111','10000','10000','11110','10000','10000','10000'],
        G: ['01111','10000','10000','10011','10001','10001','01110'],
        H: ['10001','10001','10001','11111','10001','10001','10001'],
        I: ['11111','00100','00100','00100','00100','00100','11111'],
        J: ['00111','00010','00010','00010','10010','10010','01100'],
        K: ['10001','10010','10100','11000','10100','10010','10001'],
        L: ['10000','10000','10000','10000','10000','10000','11111'],
        M: ['10001','11011','10101','10101','10001','10001','10001'],
        N: ['10001','11001','10101','10011','10001','10001','10001'],
        O: ['01110','10001','10001','10001','10001','10001','01110'],
        P: ['11110','10001','10001','11110','10000','10000','10000'],
        Q: ['01110','10001','10001','10001','10101','10010','01101'],
        R: ['11110','10001','10001','11110','10100','10010','10001'],
        S: ['01111','10000','10000','01110','00001','00001','11110'],
        T: ['11111','00100','00100','00100','00100','00100','00100'],
        U: ['10001','10001','10001','10001','10001','10001','01110'],
        V: ['10001','10001','10001','10001','10001','01010','00100'],
        W: ['10001','10001','10001','10101','10101','10101','01010'],
        X: ['10001','10001','01010','00100','01010','10001','10001'],
        Y: ['10001','10001','01010','00100','00100','00100','00100'],
        Z: ['11111','00001','00010','00100','01000','10000','11111'],
        0: ['01110','10001','10011','10101','11001','10001','01110'],
        1: ['00100','01100','00100','00100','00100','00100','01110'],
        2: ['01110','10001','00001','00010','00100','01000','11111'],
        3: ['11110','00001','00001','01110','00001','00001','11110'],
        4: ['10010','10010','10010','11111','00010','00010','00010'],
        5: ['11111','10000','10000','11110','00001','00001','11110'],
        6: ['01110','10000','10000','11110','10001','10001','01110'],
        7: ['11111','00001','00010','00100','01000','01000','01000'],
        8: ['01110','10001','10001','01110','10001','10001','01110'],
        9: ['01110','10001','10001','01111','00001','00001','01110'],
        '!': ['00100','00100','00100','00100','00100','00000','00100'],
        '?': ['01110','10001','00001','00010','00100','00000','00100'],
        '.': ['00000','00000','00000','00000','00000','01100','01100'],
        '-': ['00000','00000','00000','11111','00000','00000','00000'],
        '_': ['00000','00000','00000','00000','00000','00000','11111'],
        '/': ['00001','00010','00010','00100','01000','01000','10000'],
        ':': ['00000','01100','01100','00000','01100','01100','00000'],
        ' ': ['000','000','000','000','000','000','000']
      };

      const fallbackGlyph = (char) => {
        const safe = char === ' ' ? ' ' : char;
        return [
          '11111',
          '10001',
          '10001',
          '10001',
          '10001',
          '10001',
          '11111'
        ].map((row, index) => {
          if (index === 3 && safe !== ' ') return '10' + safe + '01'.slice(String(safe).length);
          return row;
        });
      };

      const getLang = () => {
        const code = localStorage.getItem('app_lang') || 'en';
        return i18n[code] ? code : 'en';
      };

      function renderI18n() {
        const lang = getLang();
        const dict = i18n[lang] || i18n.en;
        document.documentElement.lang = lang;
        els.langSelector.querySelectorAll('a').forEach((a) => {
          a.classList.toggle('active', a.dataset.lang === lang);
        });
        document.title = dict.title;
        document.querySelectorAll('[data-i18n]').forEach((el) => {
          const key = el.dataset.i18n;
          if (dict[key]) el.textContent = dict[key];
        });
        document.querySelectorAll('[data-i18n-placeholder]').forEach((el) => {
          const key = el.dataset.i18nPlaceholder;
          if (dict[key]) el.placeholder = dict[key];
        });
        render();
      }

      function setTheme(theme) {
        document.documentElement.dataset.theme = theme;
        localStorage.setItem('app_theme', theme);
        els.theme.innerHTML = theme === 'light' ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
      }

      function normalizeInput(value) {
        if (els.caseMode.value === 'upper') return value.toUpperCase();
        if (els.caseMode.value === 'lower') return value.toLowerCase();
        return value;
      }

      function makeArt() {
        const fill = els.fill.value.trim() || '#';
        const gap = ' '.repeat(Number(els.spacing.value));
        const lines = normalizeInput(els.text.value || '').split('\n');
        const renderedLines = [];

        lines.forEach((line, lineIndex) => {
          const rows = Array.from({ length: 7 }, () => '');
          [...line].forEach((char, charIndex) => {
            const glyph = font[char.toUpperCase()] || fallbackGlyph(char);
            glyph.forEach((row, rowIndex) => {
              const converted = row.replace(/[01]/g, (bit, column) => {
                if (bit === '0') return ' ';
                if (els.style.value === 'block') return fill;
                const up = glyph[rowIndex - 1]?.[column] === '1';
                const down = glyph[rowIndex + 1]?.[column] === '1';
                const left = row[column - 1] === '1';
                const right = row[column + 1] === '1';
                return up && down && left && right ? ' ' : fill;
              });
              rows[rowIndex] += converted + (charIndex < line.length - 1 ? gap : '');
            });
          });
          renderedLines.push(...rows);
          if (lineIndex < lines.length - 1) renderedLines.push('');
        });

        return renderedLines.join('\n').replace(/\s+$/gm, '');
      }

      function render() {
        const dict = i18n[getLang()] || i18n.en;
        const art = makeArt();
        els.output.textContent = art || dict.empty;
        const rows = art ? art.split('\n') : [];
        const cols = rows.reduce((max, row) => Math.max(max, row.length), 0);
        els.size.textContent = art ? dict.size.replace('{{cols}}', cols).replace('{{rows}}', rows.length) : '';
      }

      function setStatus(key) {
        const dict = i18n[getLang()] || i18n.en;
        els.status.textContent = dict[key] || '';
        clearTimeout(setStatus.timer);
        setStatus.timer = setTimeout(() => { els.status.textContent = ''; }, 2400);
      }

      async function copyArt() {
        const art = makeArt();
        if (!art) return setStatus('empty');
        await navigator.clipboard.writeText(art);
        setStatus('copied');
      }

      function downloadArt() {
        const art = makeArt();
        if (!art) return setStatus('empty');
        const url = URL.createObjectURL(new Blob([art], { type: 'text/plain;charset=utf-8' }));
        const link = document.createElement('a');
        link.href = url;
        link.download = 'char-art.txt';
        link.click();
        URL.revokeObjectURL(url);
        setStatus('downloaded');
      }

      ['input', 'change'].forEach((eventName) => {
        [els.text, els.fill, els.spacing, els.caseMode, els.style].forEach((el) => el.addEventListener(eventName, render));
      });

      els.langSelector.addEventListener('click', (event) => {
        const link = event.target.closest('a[data-lang]');
        if (!link || !els.langSelector.contains(link)) return;
        event.preventDefault();
        const next = link.dataset.lang;
        if (next && i18n[next]) {
          localStorage.setItem('app_lang', next);
          renderI18n();
        }
      });
      els.theme.addEventListener('click', () => setTheme(document.documentElement.dataset.theme === 'light' ? 'dark' : 'light'));
      els.copy.addEventListener('click', copyArt);
      els.download.addEventListener('click', downloadArt);
      els.clear.addEventListener('click', () => {
        els.text.value = '';
        render();
      });

      setTheme(localStorage.getItem('app_theme') || 'dark');
      renderI18n();
    })();
  </script>
</body>
</html>
