<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vector Studio</title>
  <meta name="description" content="Single-file vector editor with SVG shapes, paths, text, autosave, themes, and EN/PT/JA UI." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/fontawesome/css/all.min.css" />
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-NWZDZ906DJ"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-NWZDZ906DJ');
  </script>
  <style>
    :root{
      --bg:#071018;
      --panel:#0f1b26;
      --panel-2:#132434;
      --panel-3:#173048;
      --surface:#0b1520;
      --surface-2:#112233;
      --text:#eef5ff;
      --muted:#9bb0c5;
      --line:#1f3951;
      --accent:#ff7f50;
      --accent-2:#ffb36a;
      --accent-cool:#52c7ff;
      --success:#43d19e;
      --danger:#ff667e;
      --shadow:0 24px 70px rgba(0,0,0,.34);
      --grid:#17354f;
      --artboard:#ffffff;
      --artboard-grid:#eff5fb;
      --handle:#0a1220;
      --handle-stroke:#ffffff;
    }
    html[data-theme="light"]{
      --bg:#f2f6fa;
      --panel:#ffffff;
      --panel-2:#f7fafc;
      --panel-3:#ecf2f8;
      --surface:#e9f0f6;
      --surface-2:#dce7f0;
      --text:#102132;
      --muted:#5e738a;
      --line:#cfdae5;
      --accent:#dd5b2e;
      --accent-2:#f3a14c;
      --accent-cool:#1487cc;
      --success:#0c9f68;
      --danger:#d94b61;
      --shadow:0 18px 50px rgba(10,27,44,.12);
      --grid:#c5d7e7;
      --artboard:#ffffff;
      --artboard-grid:#edf3f8;
      --handle:#ffffff;
      --handle-stroke:#102132;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font:14px/1.45 "IBM Plex Sans", system-ui, sans-serif;
      background:
        radial-gradient(circle at top left, color-mix(in srgb, var(--accent) 18%, transparent), transparent 28%),
        radial-gradient(circle at bottom right, color-mix(in srgb, var(--accent-cool) 16%, transparent), transparent 26%),
        var(--bg);
      color:var(--text);
      overflow:hidden;
    }
    button,input,select,textarea{font:inherit}
    .app{
      display:grid;
      grid-template-rows:auto 1fr auto;
      grid-template-columns:76px minmax(0,1fr) 320px;
      height:100vh;
      gap:12px;
      padding:12px;
    }
    .shell{
      background:color-mix(in srgb, var(--panel) 92%, transparent);
      border:1px solid color-mix(in srgb, var(--line) 84%, transparent);
      box-shadow:var(--shadow);
      backdrop-filter:blur(14px) saturate(125%);
    }
    .header{
      grid-column:1 / 4;
      display:flex;
      align-items:center;
      gap:10px;
      padding:12px 14px;
      border-radius:24px;
      min-height:72px;
    }
    .brand{
      display:flex;
      flex-direction:column;
      gap:2px;
      min-width:170px;
    }
    .brand-title{
      font:700 1.2rem/1 "Space Grotesk", sans-serif;
      letter-spacing:.02em;
    }
    .brand-sub{
      color:var(--muted);
      font-size:.84rem;
    }
    .toolbar-group,
    .header-group{
      display:flex;
      align-items:center;
      gap:8px;
      padding:8px;
      border-radius:18px;
      background:color-mix(in srgb, var(--panel-2) 88%, transparent);
      border:1px solid color-mix(in srgb, var(--line) 78%, transparent);
    }
    .spacer{flex:1}
    .btn,
    .tool-btn,
    .icon-btn,
    .select,
    .field,
    .text-input,
    .number-input,
    .textarea{
      border:1px solid var(--line);
      color:var(--text);
      background:var(--panel-2);
      transition:background .16s ease, transform .16s ease, border-color .16s ease;
    }
    .btn,
    .icon-btn{
      border-radius:14px;
      min-height:42px;
      padding:0 14px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      cursor:pointer;
      font-weight:600;
    }
    .btn:hover,
    .tool-btn:hover,
    .icon-btn:hover,
    .select:hover,
    .field:hover,
    .text-input:hover,
    .number-input:hover,
    .textarea:hover{
      background:var(--panel-3);
      border-color:color-mix(in srgb, var(--accent-cool) 38%, var(--line));
    }
    .btn.primary{
      background:linear-gradient(135deg, var(--accent), var(--accent-2));
      border-color:transparent;
      color:#130d09;
    }
    .btn.primary:hover{background:linear-gradient(135deg, color-mix(in srgb, var(--accent) 92%, white), color-mix(in srgb, var(--accent-2) 90%, white));}
    .toolbox{
      position:relative;
      z-index:30;
      overflow:visible;
      display:flex;
      flex-direction:column;
      gap:10px;
      padding:10px;
      border-radius:24px;
      align-self:stretch;
    }
    .tool-btn,
    .icon-btn{
      position:relative;
      min-width:54px;
      min-height:54px;
      border-radius:18px;
      padding:0;
      display:grid;
      place-items:center;
      cursor:pointer;
      font-size:1rem;
    }
    .tool-btn.active{
      background:linear-gradient(135deg, color-mix(in srgb, var(--accent) 76%, #fff 4%), color-mix(in srgb, var(--accent-cool) 72%, #fff 4%));
      color:#0f1620;
      border-color:transparent;
      transform:translateY(-1px);
    }
    .tool-btn::after,
    .icon-btn::after,
    .tool-btn::before,
    .icon-btn::before{
      pointer-events:none;
      position:absolute;
      opacity:0;
      transform:translateY(6px);
      transition:opacity .15s ease, transform .15s ease;
    }
    .tool-btn::after,
    .icon-btn::after{
      content:attr(data-tip);
      left:calc(100% + 10px);
      top:50%;
      translate:0 -50%;
      white-space:nowrap;
      background:rgba(6,12,20,.92);
      color:#fff;
      border:1px solid rgba(255,255,255,.12);
      border-radius:10px;
      padding:6px 10px;
      font-size:.79rem;
      z-index:20;
    }
    .tool-btn::before,
    .icon-btn::before{
      content:"";
      left:calc(100% + 2px);
      top:50%;
      translate:0 -50%;
      border:6px solid transparent;
      border-right-color:rgba(6,12,20,.92);
      z-index:19;
    }
    .tool-btn:hover::after,
    .tool-btn:hover::before,
    .icon-btn:hover::after,
    .icon-btn:hover::before,
    .tool-btn:focus-visible::after,
    .tool-btn:focus-visible::before,
    .icon-btn:focus-visible::after,
    .icon-btn:focus-visible::before{
      opacity:1;
      transform:translateY(0);
    }
    .workspace{
      position:relative;
      z-index:1;
      min-width:0;
      min-height:0;
      border-radius:28px;
      overflow:hidden;
      display:flex;
      flex-direction:column;
    }
    .workspace-top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:10px 14px;
      border-bottom:1px solid color-mix(in srgb, var(--line) 76%, transparent);
      background:color-mix(in srgb, var(--panel) 94%, transparent);
    }
    .meta-strip{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      color:var(--muted);
      font-size:.83rem;
    }
    .stage-wrap{
      position:relative;
      flex:1;
      min-height:0;
      background:
        linear-gradient(45deg, color-mix(in srgb, var(--surface) 88%, transparent) 25%, transparent 25%),
        linear-gradient(-45deg, color-mix(in srgb, var(--surface) 88%, transparent) 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, color-mix(in srgb, var(--surface) 88%, transparent) 75%),
        linear-gradient(-45deg, transparent 75%, color-mix(in srgb, var(--surface) 88%, transparent) 75%);
      background-size:28px 28px;
      background-position:0 0, 0 14px, 14px -14px, -14px 0;
      cursor:crosshair;
    }
    .stage-wrap.hand{cursor:grab}
    .stage-wrap.dragging-hand{cursor:grabbing}
    #stage{
      width:100%;
      height:100%;
      display:block;
      touch-action:none;
      user-select:none;
    }
    .sidebar{
      border-radius:28px;
      padding:12px;
      overflow:auto;
    }
    .panel-section{
      background:color-mix(in srgb, var(--panel-2) 90%, transparent);
      border:1px solid color-mix(in srgb, var(--line) 74%, transparent);
      border-radius:22px;
      padding:14px;
      margin-bottom:12px;
    }
    .panel-title{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      margin:0 0 12px;
      font:700 .98rem/1 "Space Grotesk", sans-serif;
    }
    .stack{display:flex;flex-direction:column;gap:10px}
    .row{display:flex;align-items:center;gap:8px}
    .row.wrap{flex-wrap:wrap}
    .field{
      min-height:40px;
      border-radius:14px;
      padding:0 10px;
      display:flex;
      align-items:center;
      gap:8px;
      width:100%;
      background:var(--surface);
    }
    .field span,
    .field label{
      font-size:.82rem;
      color:var(--muted);
      white-space:nowrap;
    }
    .text-input,
    .number-input,
    .select,
    .textarea{
      width:100%;
      min-height:40px;
      border-radius:14px;
      padding:0 12px;
      outline:none;
    }
    .textarea{
      min-height:88px;
      padding:10px 12px;
      resize:vertical;
    }
    .number-input.small,
    .select.small{max-width:110px}
    input[type="color"]{
      width:42px;
      height:32px;
      padding:0;
      border:none;
      background:transparent;
      cursor:pointer;
    }
    input[type="checkbox"]{accent-color:var(--accent)}
    .layer-list,
    .item-list{display:flex;flex-direction:column;gap:8px}
    .layer-row,
    .item-row{
      display:grid;
      grid-template-columns:auto 1fr auto auto;
      gap:8px;
      align-items:center;
      padding:10px 12px;
      border:1px solid var(--line);
      border-radius:16px;
      background:var(--surface);
    }
    .item-row{grid-template-columns:auto 1fr auto}
    .layer-row.active,
    .item-row.active{
      border-color:color-mix(in srgb, var(--accent-cool) 40%, var(--line));
      background:color-mix(in srgb, var(--surface-2) 92%, transparent);
    }
    .layer-name,
    .item-name{
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
      font-weight:600;
    }
    .layer-meta,
    .item-meta,
    .muted{color:var(--muted)}
    .statusbar{
      grid-column:1 / 4;
      display:flex;
      align-items:center;
      gap:12px;
      padding:10px 14px;
      border-radius:22px;
      font-size:.84rem;
      color:var(--muted);
      overflow:auto;
    }
    .pill{
      display:inline-flex;
      align-items:center;
      gap:6px;
      border:1px solid var(--line);
      padding:6px 10px;
      border-radius:999px;
      background:color-mix(in srgb, var(--panel-2) 86%, transparent);
      white-space:nowrap;
    }
    .shortcut{
      font-family:ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      background:var(--surface);
      border:1px solid var(--line);
      color:var(--text);
      padding:2px 7px;
      border-radius:9px;
      font-size:.78rem;
    }
    .hidden{display:none !important}
    .toast{
      position:fixed;
      right:16px;
      bottom:16px;
      display:flex;
      align-items:center;
      gap:10px;
      padding:12px 16px;
      background:rgba(6,12,20,.94);
      color:#fff;
      border:1px solid rgba(255,255,255,.12);
      border-radius:16px;
      box-shadow:var(--shadow);
      opacity:0;
      pointer-events:none;
      transform:translateY(10px);
      transition:opacity .18s ease, transform .18s ease;
      z-index:40;
    }
    .toast.show{opacity:1;transform:translateY(0)}
    .overlay-label{
      fill:var(--text);
      font-size:12px;
      font-weight:600;
    }
    .selection-box{
      fill:none;
      stroke:var(--accent-cool);
      stroke-width:1.5;
      stroke-dasharray:8 6;
      vector-effect:non-scaling-stroke;
      pointer-events:none;
    }
    .handle,
    .node-handle{
      fill:var(--handle);
      stroke:var(--handle-stroke);
      stroke-width:1.5;
      vector-effect:non-scaling-stroke;
      cursor:pointer;
    }
    .node-handle{fill:var(--accent-cool)}
    .artboard-shadow{filter:drop-shadow(0 24px 40px rgba(0,0,0,.24))}
    .guide-line{
      stroke:color-mix(in srgb, var(--accent) 65%, var(--accent-cool));
      stroke-width:1;
      stroke-dasharray:4 4;
      vector-effect:non-scaling-stroke;
      opacity:.85;
    }
    @media (max-width: 1180px){
      .app{
        grid-template-columns:64px minmax(0,1fr);
        grid-template-rows:auto minmax(0,1fr) minmax(180px,auto) auto;
      }
      .header{grid-column:1 / 3}
      .workspace{grid-column:2 / 3}
      .sidebar{grid-column:1 / 3;grid-row:3 / 4;max-height:36vh}
      .statusbar{grid-column:1 / 3}
    }
    @media (max-width: 760px){
      .app{padding:8px;gap:8px}
      .header{padding:10px;border-radius:20px;flex-wrap:wrap}
      .toolbar-group,.header-group{width:100%;justify-content:flex-start;overflow:auto}
      .tool-btn::after,.tool-btn::before,.icon-btn::after,.icon-btn::before{display:none}
      .workspace-top{flex-direction:column;align-items:flex-start}
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header shell">
      <div class="brand">
        <div class="brand-title" data-i18n="brandTitle">Vector Studio</div>
        <div class="brand-sub" data-i18n="brandSub">SVG editor with autosave, themes, and multilingual UI.</div>
      </div>
      <div class="header-group">
        <button class="btn primary" id="newDocBtn"><i class="fa-solid fa-file-circle-plus"></i><span data-i18n="newDoc">New</span></button>
        <button class="btn" id="importJsonBtn"><i class="fa-solid fa-file-import"></i><span data-i18n="importJson">Import JSON</span></button>
        <button class="btn" id="exportJsonBtn"><i class="fa-solid fa-file-code"></i><span data-i18n="exportJson">Export JSON</span></button>
        <button class="btn" id="exportSvgBtn"><i class="fa-regular fa-image"></i><span data-i18n="exportSvg">Export SVG</span></button>
        <button class="btn" id="exportPngBtn"><i class="fa-solid fa-file-export"></i><span data-i18n="exportPng">Export PNG</span></button>
      </div>
      <div class="spacer"></div>
      <div class="header-group">
        <button class="icon-btn" id="undoBtn" data-tip="Undo"><i class="fa-solid fa-rotate-left"></i></button>
        <button class="icon-btn" id="redoBtn" data-tip="Redo"><i class="fa-solid fa-rotate-right"></i></button>
        <button class="icon-btn" id="fitBtn" data-tip="Fit artboard"><i class="fa-solid fa-expand"></i></button>
      </div>
      <div class="header-group">
        <select class="select small" id="themeSelect" aria-label="Theme">
          <option value="dark">Dark</option>
          <option value="light">Light</option>
        </select>
        <select class="select small" id="langSelect" aria-label="Language">
          <option value="en">EN</option>
          <option value="pt">PT</option>
          <option value="ja">JA</option>
        </select>
      </div>
      <input type="file" id="jsonInput" accept="application/json,.json" class="hidden" />
    </header>

    <aside class="toolbox shell" aria-label="Tools">
      <button class="tool-btn active" data-tool="select" data-tip="Select (V)" aria-label="Select"><i class="fa-solid fa-arrow-pointer"></i></button>
      <button class="tool-btn" data-tool="hand" data-tip="Hand (H)" aria-label="Hand"><i class="fa-solid fa-hand"></i></button>
      <button class="tool-btn" data-tool="rect" data-tip="Rectangle (R)" aria-label="Rectangle"><i class="fa-regular fa-square"></i></button>
      <button class="tool-btn" data-tool="ellipse" data-tip="Ellipse (O)" aria-label="Ellipse"><i class="fa-regular fa-circle"></i></button>
      <button class="tool-btn" data-tool="line" data-tip="Line (L)" aria-label="Line"><i class="fa-solid fa-slash"></i></button>
      <button class="tool-btn" data-tool="pen" data-tip="Path (P)" aria-label="Path"><i class="fa-solid fa-pen-nib"></i></button>
      <button class="tool-btn" data-tool="text" data-tip="Text (T)" aria-label="Text"><i class="fa-solid fa-font"></i></button>
      <div style="height:1px;background:var(--line);margin:2px 4px"></div>
      <button class="icon-btn" id="duplicateBtn" data-tip="Duplicate"><i class="fa-regular fa-clone"></i></button>
      <button class="icon-btn" id="bringFrontBtn" data-tip="Bring forward"><i class="fa-solid fa-layer-group"></i></button>
      <button class="icon-btn" id="sendBackBtn" data-tip="Send backward"><i class="fa-solid fa-layer-group" style="transform:scaleY(-1)"></i></button>
      <button class="icon-btn" id="deleteBtn" data-tip="Delete"><i class="fa-solid fa-trash"></i></button>
    </aside>

    <main class="workspace shell">
      <div class="workspace-top">
        <div class="meta-strip">
          <span class="pill"><i class="fa-regular fa-file-lines"></i><strong id="docName">vector-studio</strong></span>
          <span class="pill"><i class="fa-solid fa-up-right-and-down-left-from-center"></i><span id="docSizeLabel">1280 x 800</span></span>
          <span class="pill"><i class="fa-solid fa-magnifying-glass-plus"></i><span id="zoomLabel">100%</span></span>
          <span class="pill"><i class="fa-solid fa-layer-group"></i><span id="selectionLabel" data-i18n="nothingSelected">Nothing selected</span></span>
        </div>
        <div class="toolbar-group">
          <label class="row"><input type="checkbox" id="showGridToggle" checked /><span data-i18n="showGrid">Grid</span></label>
          <label class="row"><input type="checkbox" id="snapToggle" checked /><span data-i18n="snap">Snap</span></label>
          <label class="row"><span class="muted" data-i18n="gridSize">Grid</span><input class="number-input small" id="gridSizeInput" type="number" min="4" max="200" step="1" value="24" /></label>
        </div>
      </div>
      <div class="stage-wrap" id="stageWrap">
        <svg id="stage" viewBox="0 0 100 100" aria-label="Vector editor stage">
          <defs>
            <pattern id="artboard-grid" width="24" height="24" patternUnits="userSpaceOnUse">
              <rect width="24" height="24" fill="var(--artboard)" />
              <path d="M 24 0 L 0 0 0 24" fill="none" stroke="var(--artboard-grid)" stroke-width="1" />
            </pattern>
          </defs>
          <g id="camera">
            <g id="artboardGroup" class="artboard-shadow">
              <rect id="artboard" x="0" y="0" width="1280" height="800" fill="url(#artboard-grid)" stroke="rgba(0,0,0,.08)" />
            </g>
            <g id="scene"></g>
            <g id="guides"></g>
            <g id="overlay"></g>
          </g>
        </svg>
      </div>
    </main>

    <aside class="sidebar shell">
      <section class="panel-section">
        <h2 class="panel-title"><span data-i18n="documentPanel">Document</span><i class="fa-regular fa-file"></i></h2>
        <div class="stack">
          <label class="field"><span data-i18n="documentName">Name</span><input class="text-input" id="docNameInput" type="text" /></label>
          <div class="row wrap">
            <label class="field"><span data-i18n="width">W</span><input class="number-input" id="docWidthInput" type="number" min="64" max="4000" step="1" /></label>
            <label class="field"><span data-i18n="height">H</span><input class="number-input" id="docHeightInput" type="number" min="64" max="4000" step="1" /></label>
          </div>
          <label class="field"><span data-i18n="background">Background</span><input id="docBgInput" type="color" value="#ffffff" /></label>
        </div>
      </section>

      <section class="panel-section">
        <h2 class="panel-title"><span data-i18n="selectionPanel">Selection</span><i class="fa-solid fa-crosshairs"></i></h2>
        <div class="stack">
          <div class="row wrap">
            <label class="field"><span data-i18n="fill">Fill</span><input id="fillInput" type="color" value="#ff7f50" /></label>
            <label class="field"><span data-i18n="stroke">Stroke</span><input id="strokeInput" type="color" value="#0b1320" /></label>
          </div>
          <div class="row wrap">
            <label class="field"><span data-i18n="strokeWidth">Stroke</span><input class="number-input" id="strokeWidthInput" type="number" min="0" max="80" step="1" /></label>
            <label class="field"><span data-i18n="opacity">Opacity</span><input class="number-input" id="opacityInput" type="number" min="0" max="1" step="0.05" /></label>
          </div>
          <div class="row wrap">
            <label class="field"><span data-i18n="fontSize">Font</span><input class="number-input" id="fontSizeInput" type="number" min="8" max="240" step="1" /></label>
            <label class="field"><span data-i18n="fontWeight">Weight</span>
              <select class="select" id="fontWeightSelect">
                <option value="400">400</option>
                <option value="500">500</option>
                <option value="600">600</option>
                <option value="700">700</option>
              </select>
            </label>
          </div>
          <label class="field"><span data-i18n="textContent">Text</span><input class="text-input" id="textContentInput" type="text" /></label>
          <label class="field"><span data-i18n="closedPath">Closed</span><input id="closedPathInput" type="checkbox" /></label>
          <label class="field"><span data-i18n="itemLabel">Label</span><input class="text-input" id="itemNameInput" type="text" /></label>
        </div>
      </section>

      <section class="panel-section">
        <h2 class="panel-title"><span data-i18n="layersPanel">Layers</span>
          <div class="row">
